# Stage 3b: 局所パッチ BCE + KD + EWC 学習 設定 (v2)
# Stage 3a を廃止し，Stage 2 チェックポイントから直接 Stage 3b を開始する。
# テキストエンコーダ: BiomedCLIP (microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224)
#   → テキスト出力次元 512 (ViT-bigG-14 の 1280 から変更)

seed: 42
output_dir: "outputs/stage3b"

# ---------- データ ----------
data:
  ply_dir:  "../../../Dataset/6167726/STLs/STLs/normPLYs"
  json_path: "../../data/DentalPatchData/dental_vocab/candidates.json"
  npoints:   2048
  val_ratio: 0.2
  text_augment:  true
  point_augment: true

# ---------- CLIP ----------
# BiomedCLIP: open_clip の hf-hub: 形式でロード。pretrained は不要 (空文字)。
clip:
  model:          "hf-hub:microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"
  pretrained:     ""
  cache_capacity: 10000

# ---------- モデル ----------
model:
  trans_dim:      384
  depth:          12
  drop_path_rate: 0.1
  cls_dim:        50
  num_heads:      6
  group_size:     32
  num_group:      128
  encoder_dims:   256
  color:          false
  num_classes:    16
  clip_dim:       512    # BiomedCLIP テキスト出力次元 (ViT-bigG-14 の 1280 から変更)
  clip_tau:       0.07

  # Stage 2 事前学習済み重みを初期化に使用 (--init_ckpt で上書き可)
  stage2_ckpt: "../../checkpoints/patchalign3d/patchalign3d.pt"

# ---------- 損失 ----------
loss:
  lambda_bce:          1.0
  lambda_kd:           0.3
  lambda_ewc:          1000.0
  lambda_kd_text:      0.0
  ewc_fisher_batches:  50

# ---------- テキストエンコーダ ファインチューニング ----------
# Stage 3a (phase3_training.ipynb) では text_tune を使わない。
# Stage 3b のみで有効にする。
text_tune:
  enabled:       true
  n_last_layers: 1        # 解凍する最終 Transformer ブロック数 (1 = 最終層 + proj のみ)
  lr:            1.0e-5   # point encoder の lr (3e-5) より小さく設定

# ---------- 学習 ----------
training:
  epochs:        50
  batch_size:    4
  lr:            3.0e-5
  weight_decay:  0.05
  warmup_epochs: 5
  num_workers:   0
  eval_every:    5
  save_every:    10
